{% extends "base.html" %}

{% block content %}
<h2>Gestión de Cargos</h2>

<div class="card">
    <div class="card-header">Agregar nuevo cargo</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('settings.cargos') }}">
            <div class="form-group">
                <label for="nombre">Nombre del Cargo</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Agregar</button>
        </form>
    </div>
</div>

<hr>

<div class="card">
    <div class="card-header">Cargos Existentes</div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for cargo in cargos %}
                <tr>
                    <td>{{ cargo.nombre }}</td>
                    <td>
                        <form action="{{ url_for('settings.delete_cargo', id=cargo.id) }}" method="POST" style="display:inline;">
                            <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de que quieres eliminar el cargo \'{{ cargo.nombre }}\'?')">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
